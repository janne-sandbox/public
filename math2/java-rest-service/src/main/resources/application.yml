server:
  address: ${MATH2_SERVER_ADDRESS:127.0.0.1}
  port: ${MATH2_SERVER_PORT:8080}

spring:
  application:
    name: math2-rest-service
  datasource:
    url: ${MATH2_DATASOURCE_URL:jdbc:h2:file:./.math2/cache}
    username: ${MATH2_DATASOURCE_USERNAME:sa}
    password: ${MATH2_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

math2:
  precision:
    max-length: ${MATH2_MAX_LENGTH:1000}
  cache:
    enabled: ${MATH2_CACHE_ENABLED:true}
    max-entries: ${MATH2_CACHE_MAX_ENTRIES:100}
  request:
    max-batch-size: ${MATH2_MAX_BATCH_SIZE:100}
    max-expression-length: ${MATH2_MAX_EXPRESSION_LENGTH:10000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
